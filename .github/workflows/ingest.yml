name: Ingest UODO Data

on:
  schedule:
    # Run every Sunday at 02:00 UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      force:
        description: "Force re-ingestion even if recently run"
        type: boolean
        default: false

jobs:
  ingest:
    name: Ingest UODO decisions and guidelines
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ingestion
        id: ingest
        run: |
          npm run ingest 2>&1 | tee ingest.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        env:
          UODO_DB_PATH: data/uodo.db

      - name: Read ingest state
        id: state
        run: |
          STATE=$(cat data/ingest-state.json 2>/dev/null || echo '{}')
          echo "state=$STATE" >> "$GITHUB_OUTPUT"
          echo "decisions=$(echo "$STATE" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); console.log(JSON.parse(d).decisionsIngested ?? 0)")" >> "$GITHUB_OUTPUT"
          echo "guidelines=$(echo "$STATE" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); console.log(JSON.parse(d).guidelinesIngested ?? 0)")" >> "$GITHUB_OUTPUT"

      - name: Write job summary
        run: |
          echo "## UODO Ingest Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Decisions Ingested | ${{ steps.state.outputs.decisions }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Guidelines Ingested | ${{ steps.state.outputs.guidelines }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Exit Code | ${{ steps.ingest.outputs.exit_code }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Commit updated ingest state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ingest-state.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update ingest-state.json [decisions=${{ steps.state.outputs.decisions }}, guidelines=${{ steps.state.outputs.guidelines }}]"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Upload ingest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingest-log
          path: ingest.log
          retention-days: 14
